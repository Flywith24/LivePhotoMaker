name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: ./build_app.sh

      - name: Package app
        run: ditto -c -k --keepParent .build/LivePhotoMaker.app LivePhotoMaker.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LivePhotoMaker-app
          path: LivePhotoMaker.app.zip
