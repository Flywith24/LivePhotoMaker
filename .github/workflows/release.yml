name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: APP_VERSION="${GITHUB_REF_NAME#v}" ./build_app.sh

      - name: Rename dmg
        run: cp .build/dist/LivePhotoMaker.dmg LivePhotoMaker-${{ github.ref_name }}-macos.dmg

      - name: Generate release notes
        run: bash scripts/make_release_notes.sh "${{ github.ref_name }}" release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: LivePhotoMaker ${{ github.ref_name }}
          body_path: release_notes.md
          files: LivePhotoMaker-${{ github.ref_name }}-macos.dmg
